services:
  traefik:
    image: traefik:v3.5
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "8000:80"    # HTTP (use "80:80" in production)
      - "8080:8080"  # Traefik dashboard
      # - "443:443"  # HTTPS (uncomment for production)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik-users.txt:/traefik-users.txt:ro
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow_password
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mlflow:
    build:
      context: ./mlflow-server
    environment:
      MLFLOW_SERVER_ALLOWED_HOSTS: "mlflow.localhost:8000,mlflow.localhost,localhost,127.0.0.1,mlflow,mlflow:5000"
      MLFLOW_TRACKING_SERVER_HOST: "0.0.0.0"
    volumes:
      - mlflow_artifacts:/mlflow-artifacts
    depends_on:
      db:
        condition: service_healthy
    command: [
      "mlflow", "server",
      "--host", "0.0.0.0",
      "--port", "5000",
      "--backend-store-uri", "postgresql://mlflow:mlflow_password@db:5432/mlflow",
      "--artifacts-destination", "file:///mlflow-artifacts",
      "--serve-artifacts"
    ]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mlflow.rule=Host(`mlflow.localhost`)"
      # For production, change to: Host(`mlflow.yourdomain.com`)
      - "traefik.http.services.mlflow.loadbalancer.server.port=5000"
      # Enable Basic Auth (comment out to disable)
      - "traefik.http.routers.mlflow.middlewares=mlflow-auth"
      - "traefik.http.middlewares.mlflow-auth.basicauth.usersfile=/traefik-users.txt"
    restart: unless-stopped

  dagster:
    build:
      context: ./mlops-system-dagster
      dockerfile: Dockerfile
    environment:
      DAGSTER_HOME: /dagster_home
      PYTHONPATH: /workspace/mlops-system-dagster/src
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DVC_CACHE_DIR: /dvc-cache
    volumes:
    # need the workspace(repo root) for dvc/data
      - .:/workspace
      - dagster_home:/dagster_home
      - dvc_cache:/dvc-cache
      - ${USERPROFILE}/.ssh:/root/.ssh:ro
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_started
    command: [
      "dagster", "dev",
      "-w", "/workspace/mlops-system-dagster/workspace.yaml",
      "-h", "0.0.0.0",
      "-p", "3000"
    ]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dagster.rule=Host(`dagster.localhost`)"
      # For production, change to: Host(`dagster.yourdomain.com`)
      - "traefik.http.services.dagster.loadbalancer.server.port=3000"
      # Enable Basic Auth (comment out to disable)
      - "traefik.http.routers.dagster.middlewares=dagster-auth"
      - "traefik.http.middlewares.dagster-auth.basicauth.usersfile=/traefik-users.txt"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  model-deployment:
    build:
      context: ./model-deployment
      dockerfile: Dockerfile
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      GRADIO_SERVER_NAME: 0.0.0.0
      GRADIO_SERVER_PORT: 7860
      # DEBUG: "1"  # Uncomment only when debugging
    depends_on:
      mlflow:
        condition: service_started
    ports:
    - "5678:5678"  # Debug port
    command: [
      "python", "app.py"
    ]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gradio.rule=Host(`gradio.localhost`)"
      # For production, change to: Host(`gradio.yourdomain.com`)
      - "traefik.http.services.gradio.loadbalancer.server.port=7860"
      # Enable Basic Auth (comment out to make Gradio public)
      - "traefik.http.routers.gradio.middlewares=gradio-auth"
      - "traefik.http.middlewares.gradio-auth.basicauth.usersfile=/traefik-users.txt"
    restart: unless-stopped

volumes:
  pg_data:
  mlflow_artifacts:
  dagster_home:
  dvc_cache:
