services:
  traefik:
    image: traefik:v3.6.1
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "8090:80"      # HTTP (Access via Port 8090 to avoid conflict with existing MLflow)
      - "8091:8080"    # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/shared/mlops/2025_msc_felix_hagenbrock/traefik-users.txt:/traefik-users.txt:ro
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow_password
    volumes:
      - /home/shared/mlops/system-state/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mlflow:
    build:
      context: /home/shared/mlops/2025_msc_felix_hagenbrock/mlflow-server
    environment:
      MLFLOW_SERVER_ALLOWED_HOSTS: "*"
    volumes:
      - /home/shared/mlops/system-state/mlflow_artifacts:/mlflow-artifacts
    depends_on:
      db:
        condition: service_healthy
    command: [
      "mlflow", "server",
      "--host", "0.0.0.0",
      "--port", "5000",
      "--backend-store-uri", "postgresql://mlflow:mlflow_password@db:5432/mlflow",
      "--artifacts-destination", "file:///mlflow-artifacts",
      "--serve-artifacts"
    ]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mlflow.rule=Host(`luke.nt.fh-koeln.de`)"
      - "traefik.http.services.mlflow.loadbalancer.server.port=5000"
      - "traefik.http.routers.mlflow.middlewares=mlflow-auth,mlflow-headers"
      - "traefik.http.middlewares.mlflow-auth.basicauth.usersfile=/traefik-users.txt"
      - "traefik.http.middlewares.mlflow-headers.headers.customrequestheaders.Host=luke.nt.fh-koeln.de"
    restart: unless-stopped

  dagster:
    build:
      context: /home/shared/mlops/2025_msc_felix_hagenbrock/mlops-system-dagster
      dockerfile: Dockerfile
    shm_size: '4gb'
    environment:
      DAGSTER_HOME: /dagster_home
      PYTHONPATH: /workspace/mlops-system-dagster/src
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DVC_CACHE_DIR: /dvc-cache
      DAGSTER_URL_PREFIX: /dagster
    volumes:
      # Repo (Code + DVC)
      - /home/shared/mlops/2025_msc_felix_hagenbrock:/workspace
      # Data
      - /home/shared/mlops/data:/workspace/data
      # Production Inference Logs
      - /home/shared/mlops/production_inference:/workspace/production_inference
      # DVC Remote Storage (local access)
      - /home/shared/mlops/dvc-storage-biomass:/dvc-remote-storage
      # System State
      - /home/shared/mlops/system-state/dagster_home:/dagster_home
      - /home/shared/mlops/system-state/dvc_cache:/dvc-cache
      - /home/shared/mlops/system-state/dagster_outputs:/dagster_outputs
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_started
    command: [
      "dagster-webserver",
      "-h", "0.0.0.0",
      "-p", "3000",
      "-w", "/workspace/mlops-system-dagster/workspace.yaml",
      "--path-prefix", "/dagster"
    ]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dagster.rule=Host(`luke.nt.fh-koeln.de`) && PathPrefix(`/dagster`)"
      - "traefik.http.services.dagster.loadbalancer.server.port=3000"
      - "traefik.http.routers.dagster.middlewares=dagster-auth"
      - "traefik.http.middlewares.dagster-auth.basicauth.usersfile=/traefik-users.txt"
    restart: unless-stopped

  dagster-daemon:
    build:
      context: /home/shared/mlops/2025_msc_felix_hagenbrock/mlops-system-dagster
      dockerfile: Dockerfile
    shm_size: '4gb'
    environment:
      DAGSTER_HOME: /dagster_home
      PYTHONPATH: /workspace/mlops-system-dagster/src
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DVC_CACHE_DIR: /dvc-cache
    volumes:
      # Repo (Code + DVC)
      - /home/shared/mlops/2025_msc_felix_hagenbrock:/workspace
      # Data
      - /home/shared/mlops/data:/workspace/data
      # Production Inference Logs
      - /home/shared/mlops/production_inference:/workspace/production_inference
      # DVC Remote Storage (local access)
      - /home/shared/mlops/dvc-storage-biomass:/dvc-remote-storage
      # System State
      - /home/shared/mlops/system-state/dagster_home:/dagster_home
      - /home/shared/mlops/system-state/dvc_cache:/dvc-cache
      - /home/shared/mlops/system-state/dagster_outputs:/dagster_outputs
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_started
    command: [
      "dagster-daemon",
      "run",
      "-w", "/workspace/mlops-system-dagster/workspace.yaml"
    ]
    restart: unless-stopped

  model-deployment:
    build:
      context: /home/shared/mlops/2025_msc_felix_hagenbrock/model-deployment
      dockerfile: Dockerfile
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      GRADIO_SERVER_NAME: 0.0.0.0
      GRADIO_SERVER_PORT: 7860
      GRADIO_ROOT_PATH: /gradio
    volumes:
      - /home/shared/mlops/production_inference:/workspace/production_inference
    depends_on:
      mlflow:
        condition: service_started
    command: [
      "python", "app.py"
    ]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gradio.rule=Host(`luke.nt.fh-koeln.de`) && PathPrefix(`/gradio`)"
      - "traefik.http.services.gradio.loadbalancer.server.port=7860"
      - "traefik.http.routers.gradio.middlewares=gradio-auth"
      - "traefik.http.middlewares.gradio-auth.basicauth.usersfile=/traefik-users.txt"
    restart: unless-stopped

  landing:
    image: nginx:stable-alpine
    volumes:
      - /home/shared/mlops/2025_msc_felix_hagenbrock/deployment/landing:/usr/share/nginx/html:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.landing.rule=Host(`luke.nt.fh-koeln.de`) && PathPrefix(`/welcome`)"
      - "traefik.http.services.landing.loadbalancer.server.port=80"
      - "traefik.http.middlewares.landing-strip.stripprefix.prefixes=/welcome"
      - "traefik.http.routers.landing.middlewares=landing-strip"
    restart: unless-stopped